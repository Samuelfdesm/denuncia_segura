services:
  app:
    image: node:20
    container_name: node_dev
    user: "node"
    working_dir: /home/node/app
    volumes:
      - .:/home/node/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=As,k71l;